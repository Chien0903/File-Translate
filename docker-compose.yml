services:
  backend:
    build:
      context: .
      dockerfile: WEB/multilanguage_transolator_be/Dockerfile
    container_name: multilanguage_translator_be
    expose:
      - "8000" # chỉ expose nội bộ, không public ra ngoài
    volumes:
      - .:/app
    working_dir: /app/WEB/multilanguage_transolator_be
    environment:
      - font_path=/usr/share/fonts/opentype/noto/NotoSerifCJK-Regular.ttc
    restart: always
    networks:
      - app_net

  frontend:
    build:
      context: ./WEB/multilanguage_transolator_fe
      dockerfile: Dockerfile
    container_name: multilanguage_translator_fe
    expose:
      - "80"
    restart: always
    networks:
      - app_net

  nginx:
    image: nginx:latest
    container_name: multilanguage_nginx
    ports:
      # Host 8080/8443: tránh lỗi bind port 80/443 trên Windows (HTTP.sys, IIS, quyền)
      # - "8080:80"
      # - "8443:443"
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mime.types:/etc/nginx/mime.types:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./www:/var/www/html:ro # ✅ sửa: mount từ ./www thay vì /var/www/html trên host
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
